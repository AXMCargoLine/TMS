<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FleetTMS Șofer">
<meta name="theme-color" content="#0f1117">
<title>FleetTMS — Șofer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;--dark:#0f1117;--white:#fff;--border:#e5e7eb;
  --text:#111827;--muted:#6b7280;
  --blue:#2563eb;--blue-light:#eff6ff;
  --green:#16a34a;--green-light:#f0fdf4;
  --orange:#ea580c;--orange-light:#fff7ed;
  --red:#dc2626;--red-light:#fef2f2;
  --yellow:#d97706;--yellow-light:#fffbeb;
  --radius:14px;--shadow:0 2px 8px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--dark);}
.login-logo{width:64px;height:64px;background:var(--blue);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.login-logo svg{width:32px;height:32px;fill:white;}
.login-title{color:white;font-size:24px;font-weight:700;text-align:center;margin-bottom:6px;}
.login-sub{color:#9ca3af;font-size:14px;text-align:center;margin-bottom:32px;}
.login-card{background:white;border-radius:var(--radius);padding:24px;width:100%;max-width:360px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border 0.15s;}
.field input:focus{border-color:var(--blue);}
.btn-login{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.15s;}
.btn-login:hover{background:#1d4ed8;}
.btn-login:active{background:#1e40af;transform:scale(0.98);}
.error-msg{background:var(--red-light);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}

/* APP */
.app{display:none;min-height:100vh;flex-direction:column;}

/* HEADER */
.header{background:var(--dark);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-icon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.header-icon svg{width:18px;height:18px;fill:white;}
.header-title{font-size:15px;font-weight:700;color:white;}
.header-sub{font-size:11px;color:#9ca3af;}
.btn-logout{background:none;border:1px solid #374151;color:#9ca3af;padding:7px 12px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;}

/* CONTENT */
.content{flex:1;padding:16px;}

/* NO TRIP */
.no-trip{background:white;border-radius:var(--radius);padding:40px 24px;text-align:center;box-shadow:var(--shadow);}
.no-trip-icon{font-size:48px;margin-bottom:16px;}
.no-trip-title{font-size:17px;font-weight:600;margin-bottom:8px;}
.no-trip-sub{font-size:14px;color:var(--muted);line-height:1.5;}
.refresh-btn{margin-top:20px;padding:12px 24px;background:var(--blue-light);color:var(--blue);border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;width:100%;}

/* TRIP CARD */
.trip-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.trip-header{background:var(--dark);padding:16px 20px;}
.trip-id{font-size:11px;color:#9ca3af;margin-bottom:4px;font-family:'JetBrains Mono',monospace;}
.trip-route{font-size:18px;font-weight:700;color:white;display:flex;align-items:center;gap:8px;}
.trip-route-arrow{color:#6b7280;font-size:16px;}
.trip-meta{display:flex;gap:16px;margin-top:10px;}
.trip-meta-item{font-size:12px;color:#9ca3af;display:flex;align-items:center;gap:4px;}

/* STATUS SECTION */
.section{padding:16px 20px;border-bottom:1px solid var(--border);}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}

/* STATUS BUTTONS */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.status-btn{padding:12px 10px;border-radius:10px;border:2px solid transparent;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;text-align:center;transition:all 0.15s;background:#f9fafb;color:var(--muted);}
.status-btn.active{transform:scale(1.02);}
.status-btn:active{transform:scale(0.97);}
.status-btn.s-planificata{border-color:#d97706;background:var(--yellow-light);color:#b45309;}
.status-btn.s-planificata.active{background:#d97706;color:white;}
.status-btn.s-incarcare{border-color:#ea580c;background:var(--orange-light);color:#9a3412;}
.status-btn.s-incarcare.active{background:#ea580c;color:white;}
.status-btn.s-tranzit{border-color:#2563eb;background:var(--blue-light);color:#1e40af;}
.status-btn.s-tranzit.active{background:#2563eb;color:white;}
.status-btn.s-vama-exp{border-color:#ea580c;background:var(--orange-light);color:#9a3412;}
.status-btn.s-vama-exp.active{background:#ea580c;color:white;}
.status-btn.s-vama-imp{border-color:#ea580c;background:var(--orange-light);color:#9a3412;}
.status-btn.s-vama-imp.active{background:#ea580c;color:white;}
.status-btn.s-descarcare{border-color:#2563eb;background:var(--blue-light);color:#1e40af;}
.status-btn.s-descarcare.active{background:#2563eb;color:white;}
.status-btn.s-finalizata{border-color:#16a34a;background:var(--green-light);color:#166534;}
.status-btn.s-finalizata.active{background:#16a34a;color:white;}
.status-btn.s-anulata{border-color:#dc2626;background:var(--red-light);color:#991b1b;}
.status-btn.s-anulata.active{background:#dc2626;color:white;}

/* WAYPOINTS */
.waypoint-list{display:flex;flex-direction:column;gap:8px;}
.waypoint-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f9fafb;border-radius:10px;border:1px solid var(--border);}
.waypoint-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s;}
.waypoint-check.done{background:var(--green);border-color:var(--green);}
.waypoint-check.done::after{content:'✓';color:white;font-size:13px;font-weight:700;}
.waypoint-info{flex:1;}
.waypoint-tip{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;}
.waypoint-loc{font-size:14px;font-weight:500;margin-top:2px;}

/* CHELTUIELI */
.chel-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.chel-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f9fafb;border-radius:10px;border:1px solid var(--border);}
.chel-item-left{font-size:13px;}
.chel-item-tip{font-weight:600;}
.chel-item-desc{font-size:12px;color:var(--muted);}
.chel-item-suma{font-weight:700;color:var(--red);font-size:14px;}

.add-chel-form{background:#f9fafb;border-radius:10px;border:1px solid var(--border);padding:14px;}
.add-chel-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.mini-field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
.mini-field input,.mini-field select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:white;}
.mini-field input:focus,.mini-field select:focus{border-color:var(--blue);}
.btn-add-chel{width:100%;padding:11px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px;}
.btn-add-chel:active{transform:scale(0.98);}

/* NOTE */
.note-area{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:80px;}
.note-area:focus{border-color:var(--blue);}
.btn-save-note{width:100%;padding:12px;background:var(--dark);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:8px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:white;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TRIP INFO ROW */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:#f9fafb;border-radius:10px;padding:12px 14px;border:1px solid var(--border);}
.info-item-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;}
.info-item-value{font-size:14px;font-weight:600;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-logo">
    <svg viewBox="0 0 24 24"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
  </div>
  <div class="login-title">FleetTMS Șofer</div>
  <div class="login-sub">Introdu numele tău pentru a vedea cursa activă</div>
  <div class="login-card">
    <div class="error-msg" id="loginError"></div>
    <div class="field">
      <label>Numele tău (exact cum e în sistem)</label>
      <input type="text" id="inputNume" placeholder="ex: Ion Popescu" autocomplete="name" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Intră în aplicație</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <div>
        <div class="header-title" id="headerNume">Șofer</div>
        <div class="header-sub">FleetTMS</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Ieșire</button>
  </div>
  <div class="content" id="appContent">
    <div class="loading"><div class="spinner"></div> Se încarcă...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://ogqyvwzmdfvyouseipik.supabase.co';
const SUPABASE_KEY='sb_publishable_ufnBdXhXbPCDUIV6eUPG_A_T-teDiXN';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}});

const STATUSES=['Planificată','La Încărcare','În Tranzit','La Vamă Export','La Vamă Import','La Descărcare','Finalizată','Anulată'];
const STATUS_CLASS={'Planificată':'s-planificata','La Încărcare':'s-incarcare','În Tranzit':'s-tranzit','La Vamă Export':'s-vama-exp','La Vamă Import':'s-vama-imp','La Descărcare':'s-descarcare','Finalizată':'s-finalizata','Anulată':'s-anulata'};

let currentNume=null;
let currentCursa=null;
let waypointsDone=[];

// AUTH
function doLogin(){
  const nume=document.getElementById('inputNume').value.trim();
  const err=document.getElementById('loginError');
  err.style.display='none';
  if(!nume){err.textContent='Introdu numele tău.';err.style.display='block';return;}
  currentNume=nume;
  localStorage.setItem('sofer_nume',nume);
  document.getElementById('headerNume').textContent=nume;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  loadCursa();
}

function doLogout(){
  localStorage.removeItem('sofer_nume');
  localStorage.removeItem('sofer_waypoints');
  currentNume=null;currentCursa=null;waypointsDone=[];
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('inputNume').value='';
}

// LOAD CURSA
async function loadCursa(){
  document.getElementById('appContent').innerHTML='<div class="loading"><div class="spinner"></div> Se caută cursa ta...</div>';
  const statuseActive=['Planificată','La Încărcare','În Tranzit','La Vamă Export','La Vamă Import','La Descărcare'];
  const{data,error}=await sb.from('curse').select('*')
    .eq('sofer',currentNume)
    .in('status',statuseActive)
    .order('created_at',{ascending:false})
    .limit(1);
  if(error){document.getElementById('appContent').innerHTML='<div class="no-trip"><div class="no-trip-icon">⚠️</div><div class="no-trip-title">Eroare conexiune</div><div class="no-trip-sub">'+error.message+'</div><button class="refresh-btn" onclick="loadCursa()">Încearcă din nou</button></div>';return;}
  if(!data||data.length===0){
    document.getElementById('appContent').innerHTML='<div class="no-trip"><div class="no-trip-icon">🚛</div><div class="no-trip-title">Nicio cursă activă</div><div class="no-trip-sub">Nu ai nicio cursă alocată în acest moment. Contactează dispecerul dacă crezi că e o eroare.</div><button class="refresh-btn" onclick="loadCursa()">🔄 Actualizează</button></div>';
    return;
  }
  currentCursa=data[0];
  // Load waypoints done state
  try{waypointsDone=JSON.parse(localStorage.getItem('sofer_waypoints_'+currentCursa.id)||'[]');}catch(e){waypointsDone=[];}
  renderCursa();
}

function renderCursa(){
  const c=currentCursa;
  let puncte=[];
  try{puncte=c.puncte_intermediare?JSON.parse(c.puncte_intermediare):[];}catch(e){}

  // Cheltuieli sofer
  loadCheltuieliSofer(c.id);

  document.getElementById('appContent').innerHTML=
  // TRIP CARD
  '<div class="trip-card">'+
  '<div class="trip-header">'+
  '<div class="trip-id">Cursă #'+c.id.slice(-8).toUpperCase()+'</div>'+
  '<div class="trip-route"><span>'+(c.origine||'—')+'</span><span class="trip-route-arrow">→</span><span>'+(c.destinatie||'—')+'</span></div>'+
  '<div class="trip-meta">'+
  '<div class="trip-meta-item">📅 '+formatDate(c.data_plecare)+'</div>'+
  '<div class="trip-meta-item">🚛 '+(c.camion||'—')+'</div>'+
  (c.remorca?'<div class="trip-meta-item">🔗 '+c.remorca+'</div>':'')+
  '</div></div>'+

  // Info grid
  '<div class="section">'+
  '<div class="section-title">Detalii Cursă</div>'+
  '<div class="info-grid">'+
  '<div class="info-item"><div class="info-item-label">Client</div><div class="info-item-value">'+(c.client||'—')+'</div></div>'+
  '<div class="info-item"><div class="info-item-label">Distanță</div><div class="info-item-value">'+(c.distanta_km?c.distanta_km+' km':'—')+'</div></div>'+
  '<div class="info-item"><div class="info-item-label">Greutate</div><div class="info-item-value">'+(c.greutate_tone?c.greutate_tone+' t':'—')+'</div></div>'+
  '<div class="info-item"><div class="info-item-label">Status Curent</div><div class="info-item-value" style="color:var(--blue)">'+(c.status||'—')+'</div></div>'+
  '</div></div>'+

  // STATUS
  '<div class="section">'+
  '<div class="section-title">Schimbă Status</div>'+
  '<div class="status-grid">'+
  STATUSES.map(s=>'<button class="status-btn '+STATUS_CLASS[s]+(c.status===s?' active':'')+'" onclick="changeStatus(\''+s+'\')">'+s+'</button>').join('')+
  '</div></div>'+

  // WAYPOINTS
  (puncte.length>0?
  '<div class="section">'+
  '<div class="section-title">Puncte de Parcurs</div>'+
  '<div class="waypoint-list" id="waypointList">'+
  puncte.map((p,i)=>'<div class="waypoint-item"><div class="waypoint-check'+(waypointsDone.includes(i)?' done':'')+'" id="wp_'+i+'" onclick="toggleWaypoint('+i+')"></div><div class="waypoint-info"><div class="waypoint-tip">'+p.tip+'</div><div class="waypoint-loc">'+p.locatie+'</div></div></div>').join('')+
  '</div></div>':'')+'</div>'+

  // CHELTUIELI
  '<div class="section">'+
  '<div class="section-title">Cheltuieli pe Drum</div>'+
  '<div id="cheltuieliList"></div>'+
  '<div class="add-chel-form">'+
  '<div class="add-chel-row">'+
  '<div class="mini-field"><label>Tip</label><select id="chel_tip"><option>Parcare</option><option>Taxă Pod</option><option>Amendă</option><option>Reparație Urgentă</option><option>Mâncare/Cazare</option><option>Altele</option></select></div>'+
  '<div class="mini-field"><label>Sumă (EUR)</label><input type="number" id="chel_suma" placeholder="0" min="0" step="0.01"></div>'+
  '</div>'+
  '<div class="mini-field" style="margin-bottom:8px"><label>Descriere</label><input type="text" id="chel_desc" placeholder="Detalii..."></div>'+
  '<button class="btn-add-chel" onclick="addCheltuiala()">+ Adaugă Cheltuială</button>'+
  '</div></div>'+

  // NOTE
  '<div class="section" style="border-bottom:none">'+
  '<div class="section-title">Note / Observații</div>'+
  '<textarea class="note-area" id="noteArea" placeholder="Adaugă observații despre cursă...">'+(c.note||'')+'</textarea>'+
  '<button class="btn-save-note" onclick="saveNote()">Salvează Notă</button>'+
  '</div>';
}

// CHANGE STATUS
async function changeStatus(newStatus){
  if(!currentCursa)return;
  const{error}=await sb.from('curse').update({status:newStatus}).eq('id',currentCursa.id);
  if(error){showToast('❌ Eroare: '+error.message);return;}
  currentCursa.status=newStatus;
  // Update active button
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  showToast('✅ Status actualizat: '+newStatus);
  // Refresh info
  document.querySelector('.info-item-value[style*="blue"]').textContent=newStatus;
}

// WAYPOINTS
function toggleWaypoint(idx){
  if(waypointsDone.includes(idx)){
    waypointsDone=waypointsDone.filter(i=>i!==idx);
  } else {
    waypointsDone.push(idx);
  }
  localStorage.setItem('sofer_waypoints_'+currentCursa.id,JSON.stringify(waypointsDone));
  const el=document.getElementById('wp_'+idx);
  if(el)el.classList.toggle('done',waypointsDone.includes(idx));
}

// CHELTUIELI
async function loadCheltuieliSofer(cursaId){
  const{data}=await sb.from('cheltuieli').select('*').eq('cursa_id',cursaId).order('created_at',{ascending:false});
  const items=data||[];
  const el=document.getElementById('cheltuieliList');
  if(!el)return;
  if(items.length===0){el.innerHTML='<div style="font-size:13px;color:var(--muted);margin-bottom:12px">Nicio cheltuială adăugată încă.</div>';return;}
  el.innerHTML='<div class="chel-list">'+items.map(i=>'<div class="chel-item"><div class="chel-item-left"><div class="chel-item-tip">'+i.tip+'</div><div class="chel-item-desc">'+(i.descriere||'')+'</div></div><div class="chel-item-suma">-&#8364;'+parseFloat(i.suma||0).toLocaleString('ro-RO')+'</div></div>').join('')+'</div>';
}

async function addCheltuiala(){
  if(!currentCursa)return;
  const tip=document.getElementById('chel_tip').value;
  const suma=parseFloat(document.getElementById('chel_suma').value)||0;
  const desc=document.getElementById('chel_desc').value.trim();
  if(!suma){showToast('Introdu suma cheltuielii.');return;}
  const{error}=await sb.from('cheltuieli').insert([{
    camion:currentCursa.camion,
    cursa_id:currentCursa.id,
    tip,suma,descriere:desc||tip,
    data:new Date().toISOString().split('T')[0]
  }]);
  if(error){showToast('❌ Eroare: '+error.message);return;}
  document.getElementById('chel_suma').value='';
  document.getElementById('chel_desc').value='';
  showToast('✅ Cheltuială adăugată!');
  loadCheltuieliSofer(currentCursa.id);
}

// NOTE
async function saveNote(){
  const note=document.getElementById('noteArea').value;
  const{error}=await sb.from('curse').update({note}).eq('id',currentCursa.id);
  if(error){showToast('❌ Eroare la salvare.');return;}
  currentCursa.note=note;
  showToast('✅ Notă salvată!');
}

// UTILS
function formatDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('ro-RO');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
